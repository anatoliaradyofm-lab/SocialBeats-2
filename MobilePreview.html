html,body{height:100%;background:#030308;

::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(167,139,250,0.3);border-radius:2px}
button{font-family:inherit;font-feature-settings:'cv02','cv03','cv04','cv11'}
input,textarea{font-family:'Inter',system-ui,sans-serif;font-feature-settings:'cv02','cv03','cv04','cv11'}
@keyframes aurora{0%,100%{transform:translate(0,0) scale(1) rotate(0deg)}33%{transform:translate(40px,-30px) scale(1.15) rotate(5deg)}66%{transform:translate(-25px,20px) scale(0.9) rotate(-3deg)}}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInUp{from{transform:translateY(48px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(167,139,250,0.4)}50%{box-shadow:0 0 45px rgba(167,139,250,0.8),0 0 80px rgba(244,114,182,0.3)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.95)}}
@keyframes wave{0%{transform:scaleY(0.4)}100%{transform:scaleY(1.2)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shimmer{0%{opacity:.4}50%{opacity:.9}100%{opacity:.4}}
@keyframes popIn{from{transform:scale(0.88);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes storyProgress{from{width:0}to{width:100%}}

/* ─── Reusable UI atoms ───────────────────────────────────── */
const Avatar = ({src, size=36, ring=false, badge=false, onClick}) => (
  <div onClick={onClick} style={{position:'relative',flexShrink:0,cursor:onClick?'pointer':'default'}}>
    <div style={{width:size,height:size,borderRadius:'50%',
      background:ring?`linear-gradient(135deg,${A.primary},${A.accent})`:'none',
      padding:ring?2:0,cursor:'pointer'}}>
      {ring && <div style={{width:'100%',height:'100%',borderRadius:'50%',background:A.bg,padding:2}}>
        <img src={src} style={{width:'100%',height:'100%',borderRadius:'50%',objectFit:'cover'}} alt="" onError={e=>e.target.src='https://i.pravatar.cc/100?u=x'}/>
      </div>}
      {!ring && <img src={src} style={{width:size,height:size,borderRadius:'50%',objectFit:'cover',border:`2px solid ${A.border}`,display:'block'}} alt="" onError={e=>e.target.src='https://i.pravatar.cc/100?u=x'}/>}
    </div>
    {badge && <div style={{position:'absolute',bottom:0,right:0,width:size*0.32,height:size*0.32,borderRadius:'50%',background:A.primary,border:`2px solid ${A.bg}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <Ico n="plus" s={size*0.18} c="#fff"/>
    </div>}
  </div>
);

const Cover = ({src, size=48, radius=10}) => (
  <img src={src} style={{width:size,height:size,borderRadius:radius,objectFit:'cover',flexShrink:0,display:'block'}} alt="" onError={e=>e.target.style.background='#333'}/>
);

const MUSIC_API = 'https://music-backend-45365938370.europe-west3.run.app';
const MOCK_USERS = [
  {id:'u1',u:'djaurora',name:'DJ Aurora',img:'https://i.pravatar.cc/80?u=dj1',followers:'12.4K'},
  {id:'u2',u:'beatmaker99',name:'BeatMaker',img:'https://i.pravatar.cc/80?u=bm2',followers:'8.2K'},
  {id:'u3',u:'melodica_tr',name:'Melodica',img:'https://i.pravatar.cc/80?u=ml3',followers:'5.7K'},
];
function SearchBar({onNavigate, onPlayTrack}) {
  const {t} = useLang();
  const [query, setQuery] = useState('');
  const [mode, setMode] = useState('music'); // 'music' | 'user'
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [open, setOpen] = useState(false);
  const timerRef = useRef(null);

  useEffect(() => {
    if (!query.trim()) { setResults([]); setOpen(false); return; }
    setOpen(true);
    clearTimeout(timerRef.current);
    if (mode === 'user') {
      setResults(MOCK_USERS.filter(u=>u.u.includes(query)||u.name.toLowerCase().includes(query.toLowerCase())));
      return;
    }
    timerRef.current = setTimeout(async () => {
      setLoading(true);
      try {
        const res = await fetch(`${MUSIC_API}/search?q=${encodeURIComponent(query)}&limit=5`);
        const data = await res.json();
        const tracks = (data.tracks||data.results||data||[]).slice(0,5).map((t,i)=>({
          id:t.id||`q${i}`,title:t.title||t.name||'Bilinmiyor',artist:t.artist||t.uploader||'',
          cover:t.thumbnail||`https://picsum.photos/seed/qs${i}/60/60`,dur:t.duration_str||'',
        }));
        setResults(tracks.length?tracks:TRACKS.slice(0,4));
      } catch { setResults(TRACKS.slice(0,4)); }
      finally { setLoading(false); }
    }, 500);
    return () => clearTimeout(timerRef.current);
  }, [query, mode]);

  return (
    <div style={{padding:'0 20px',marginBottom:20,position:'relative',zIndex:20}}>
      <div style={{display:'flex',background:A.inputBg,border:`1px solid ${open?A.primary:A.glassBorder}`,
        borderRadius:open&&results.length?'16px 16px 0 0':16,overflow:'hidden',alignItems:'center',
        transition:'border-color 0.2s'}}>
        <div style={{padding:'0 14px',opacity:0.5,display:'flex',alignItems:'center'}}>
          {loading?<div style={{width:17,height:17,border:`2px solid ${A.primary}`,borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>
                  :<Ico n="search" s={17} c={A.textSec}/>}
        </div>
        <input
          value={query}
          onChange={e=>setQuery(e.target.value)}
          placeholder={mode==='music'?t('searchMusic'):t('searchUser')}
          style={{flex:1,background:'none',border:'none',outline:'none',color:A.text,fontSize:14,fontWeight:500,
            padding:'13px 0',fontFamily:"'Inter',system-ui,sans-serif",letterSpacing:-0.1}}
        />
        {query && <button onClick={()=>{setQuery('');setOpen(false);setResults([]);}} style={{background:'none',border:'none',cursor:'pointer',padding:'0 8px'}}>
          <Ico n="close" s={14} c={A.textMut}/>
        </button>}
        <div style={{display:'flex',margin:'6px 8px',gap:4}}>
          <button onClick={()=>{setMode('music');setResults([]);}} style={{padding:'5px 10px',borderRadius:10,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,
            background:mode==='music'?A.primary:'transparent',color:mode==='music'?'#fff':A.textMut}}>{t('modeMusic')}</button>
          <button onClick={()=>{setMode('user');setResults([]);}} style={{padding:'5px 10px',borderRadius:10,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,
            background:mode==='user'?A.primary:'transparent',color:mode==='user'?'#fff':A.textMut}}>{t('modeUser')}</button>
        </div>
      </div>
      {/* Dropdown results */}
      {open && results.length>0 && (
        <div style={{background:A.surface,border:`1px solid ${A.primary}`,borderTop:'none',borderRadius:'0 0 16px 16px',overflow:'hidden'}}>
          {mode==='music' ? results.map((t,i)=>(
            <div key={t.id} onClick={()=>{onPlayTrack&&onPlayTrack(t);setQuery('');setOpen(false);setResults([]);}}
              style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',cursor:'pointer',borderTop:i>0?`1px solid ${A.borderLight}`:'none'}}>
              <Cover src={t.cover} size={38} radius={6}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{color:A.text,fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                <div style={{color:A.textMut,fontSize:11}}>{t.artist}</div>
              </div>
              <span style={{color:A.textMut,fontSize:11}}>{t.dur}</span>
            </div>
          )) : results.map((u,i)=>(
            <div key={u.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',cursor:'pointer',borderTop:i>0?`1px solid ${A.borderLight}`:'none'}}>
              <img src={u.img} style={{width:38,height:38,borderRadius:19,objectFit:'cover'}} alt=""/>
              <div style={{flex:1}}>
                <div style={{color:A.text,fontSize:13,fontWeight:700}}>{u.name}</div>
                <div style={{color:A.textMut,fontSize:11}}>@{u.u} · {u.followers} {t('followersLabel')}</div>
              </div>
              <button style={{background:A.primaryGlow,border:`1px solid ${A.primary}`,borderRadius:20,padding:'5px 12px',color:A.primary,fontSize:12,fontWeight:700,cursor:'pointer'}}>{t('followBtn')}</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── Waveform animation ──────────────────────────────────── */
const Waveform = ({active, color=A.primary}) => (
  <div style={{display:'flex',alignItems:'center',gap:2,height:20}}>
    {[1,2,3,4,5].map(i => (
      <div key={i} style={{width:3,height:active?`${[8,16,12,18,10][i-1]}px`:'4px',background:color,borderRadius:2,

/* ─── WirePlayer (MiniPlayer) ─────────────────────────────── */
const MiniPlayer = ({track, isPlaying, progress=0, posMs=0, durMs=233000, fmtTime, onToggle, onClose, onExpand, onPrev, onNext}) => {
  if (!track) return null;
  const pct = Math.min(100, Math.max(0, progress*100)).toFixed(1)+'%';
  return (
    <div onClick={onExpand} style={{position:'absolute',left:0,right:0,bottom:60,height:66,
      background:A.tabBar,borderTop:`1px solid ${A.border}`,cursor:'pointer',zIndex:10}}>
      <div style={{height:2,background:A.borderLight}}>
        <div style={{height:2,width:pct,background:`linear-gradient(90deg,${A.primaryDeep},${A.primary})`,borderRadius:1,transition:'width 0.5s linear'}}/>
      </div>
      <div style={{display:'flex',alignItems:'center',padding:'0 14px',height:64,gap:12}}>
        <Cover src={track.cover} size={44} radius={10}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:A.text,fontSize:13,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',fontFamily:A.fontDisplay,letterSpacing:-0.2}}>{track.title}</div>
          <div style={{color:A.textMut,fontSize:11,marginTop:2,fontWeight:400}}>{track.artist}</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <button onClick={e=>{e.stopPropagation();onPrev&&onPrev();}} style={{background:'none',border:'none',cursor:'pointer',padding:'8px',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ico n="prev" s={17} c={A.textSec}/>
          </button>
          <button onClick={e=>{e.stopPropagation();onToggle();}} style={{width:36,height:36,borderRadius:'50%',
            background:`linear-gradient(135deg,${A.primaryDeep},${A.primary})`,border:'none',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:`0 0 14px ${A.primaryGlow}`}}>
            <Ico n={isPlaying?'pause':'play'} s={16} c="#fff"/>
          </button>
          <button onClick={e=>{e.stopPropagation();onNext&&onNext();}} style={{background:'none',border:'none',cursor:'pointer',padding:'8px',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ico n="skip" s={17} c={A.textSec}/>
          </button>
          <button onClick={e=>{e.stopPropagation();onClose();}} style={{background:'none',border:'none',cursor:'pointer',padding:'8px',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <Ico n="close" s={16} c={A.textMut}/>
          </button>
        </div>
      </div>
    </div>
  );
};

/* ─── MODAL SYSTEM ────────────────────────────────────────── */
function ModalSystem({modal, onClose, onPlayTrack}) {
  const {type, data} = modal;
  const {t} = useLang();

  // Backdrop
  const Backdrop = ({children, full=false}) => (
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.65)',zIndex:200,display:'flex',
      flexDirection:'column',justifyContent:full?'flex-start':'flex-end',backdropFilter:'blur(4px)'}}>
      <div onClick={e=>e.stopPropagation()} style={{background:full?A.bg:A.surface,border:`1px solid ${A.glassBorder}`,
        borderRadius:full?0:'24px 24px 0 0',maxHeight:full?'100%':'85%',overflow:'hidden',
        display:'flex',flexDirection:'column',animation:full?'slideIn 0.28s ease':'slideInUp 0.28s ease'}}>
        {children}
      </div>
    </div>
  );

  /* ── STORY VIEWER ── */
  if (type === 'story') {
    const {users, idx: initIdx} = data;
    const StoryInner = () => {
      const [si, setSi] = useState(initIdx||0);
      const [paused, setPaused] = useState(false);
      const [barPct, setBarPct] = useState(0);
      const STORY_DUR = 5000;
      const user = users[si];
      useEffect(() => {
        setBarPct(0);
        if (paused) return;
        const start = Date.now();
        const iv = setInterval(() => {
          const elapsed = Date.now() - start;
          const pct = Math.min(100, (elapsed / STORY_DUR) * 100);
          setBarPct(pct);
          if (elapsed >= STORY_DUR) {
            clearInterval(iv);
            if (si < users.length - 1) setSi(s => s + 1);
            else onClose();
          }
        }, 50);
        return () => clearInterval(iv);
      }, [si, paused]);
      return (
        <div style={{position:'absolute',inset:0,background:'#000',zIndex:200,
          display:'flex',flexDirection:'column',animation:'fadeUp 0.2s ease'}}>
          <div style={{position:'absolute',inset:0,backgroundImage:`url(https://picsum.photos/seed/story${si}/393/852)`,backgroundSize:'cover',backgroundPosition:'center'}}/>
          <div style={{position:'absolute',inset:0,background:'linear-gradient(to bottom,rgba(0,0,0,0.55) 0%,transparent 30%,transparent 70%,rgba(0,0,0,0.7) 100%)'}}/>
          {/* Progress bars */}
          <div style={{position:'relative',zIndex:1,padding:'54px 12px 12px',display:'flex',gap:3}}>
            {users.map((_,i)=>(
              <div key={i} style={{flex:1,height:2.5,borderRadius:2,background:'rgba(255,255,255,0.3)',overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:2,background:'#fff',
                  width: i < si ? '100%' : i === si ? `${barPct}%` : '0%',
                  transition: i === si ? 'none' : 'none'}}/>
              </div>
            ))}
          </div>
          {/* Header */}
          <div style={{position:'relative',zIndex:1,display:'flex',alignItems:'center',gap:10,padding:'8px 16px'}}>
            <img src={user.img} style={{width:36,height:36,borderRadius:18,objectFit:'cover',border:'2px solid #fff'}} alt=""/>
            <span style={{color:'#fff',fontWeight:700,fontSize:14}}>{user.u}</span>
            <span style={{color:'rgba(255,255,255,0.6)',fontSize:12,marginLeft:4}}>2dk</span>
            <button onClick={e=>{e.stopPropagation();setPaused(p=>!p);}}
              style={{marginLeft:'auto',background:'rgba(0,0,0,0.3)',border:'none',cursor:'pointer',
                borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Ico n={paused?'play':'pause'} s={14} c="#fff"/>
            </button>
            <button onClick={onClose} style={{background:'rgba(0,0,0,0.3)',border:'none',cursor:'pointer',
              borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <Ico n="close" s={14} c="#fff"/>
            </button>
          </div>
          {/* Tap zones */}
          <div style={{position:'absolute',inset:0,display:'flex',zIndex:1}}>
            <div style={{flex:1}} onClick={e=>{e.stopPropagation();si>0?setSi(si-1):onClose();}}/>
            <div style={{flex:1}} onClick={e=>{e.stopPropagation();si<users.length-1?setSi(si+1):onClose();}}/>
          </div>
        </div>
      );
    };
    return <StoryInner/>;
  }

  /* ── PLAYLIST DETAIL ── */
  if (type === 'playlist') {
    const pl = data;
    return (
      <Backdrop full>
        <div style={{display:'flex',alignItems:'center',gap:12,padding:'52px 20px 16px',borderBottom:`1px solid ${A.border}`,flexShrink:0}}>

/* ─── SEARCH SCREEN ───────────────────────────────────────── */
const SearchScreen = ({onPlayTrack, openModal}) => {
  const [q, setQ] = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const timerRef = useRef(null);

  useEffect(() => {
    if (!q.trim()) { setResults([]); setError(null); return; }
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(async () => {
      setLoading(true); setError(null);
      try {
        const res = await fetch(`${MUSIC_API}/search?q=${encodeURIComponent(q)}&limit=10`);
        if (!res.ok) throw new Error('API Hatası');
        const data = await res.json();
        const tracks = (data.tracks||data.results||data||[]).map((t,i)=>({
          id: t.id||`sr${i}`, title: t.title||t.name||'Bilinmiyor',
          artist: t.artist||t.uploader||'Bilinmiyor',
          cover: t.thumbnail||t.cover_url||`https://picsum.photos/seed/sr${i}/80/80`,
          dur: t.duration_str||t.duration||'--',
        }));
        setResults(tracks);
      } catch(e) {
        setError('Sonuç bulunamadı, mock veriler gösteriliyor');
        setResults(TRACKS);
      } finally { setLoading(false); }
    }, 500);
    return () => clearTimeout(timerRef.current);
  }, [q]);

  return (
    <div style={{flex:1,overflowY:'auto',paddingBottom:72}}>
      <div style={{padding:'52px 20px 20px'}}>
        <div style={{color:A.text,fontSize:26,fontWeight:800,letterSpacing:-1,marginBottom:16}}>Arama</div>
        <div style={{display:'flex',alignItems:'center',gap:10,background:A.inputBg,borderRadius:14,
          border:`1px solid ${A.glassBorder}`,padding:'12px 16px'}}>
          <Ico n="search" s={18} c={A.textMut}/>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Şarkı, sanatçı, çalma listesi…"
            style={{flex:1,background:'none',border:'none',outline:'none',color:A.text,fontSize:14,fontWeight:500,fontFamily:"'Inter',system-ui,sans-serif"}}/>
          {q && <button onClick={()=>setQ('')} style={{background:'none',border:'none',cursor:'pointer',padding:2}}><Ico n="close" s={16} c={A.textMut}/></button>}
        </div>
      </div>

      {/* Search Results */}
      {q.trim() ? (
        <div style={{padding:'0 20px'}}>
          {error && <div style={{color:A.textMut,fontSize:12,marginBottom:12,padding:'8px 12px',background:A.surface,borderRadius:8}}>{error}</div>}
          {loading
            ? <div style={{textAlign:'center',padding:'32px 0',color:A.textMut,fontSize:14}}>Aranıyor…</div>
            : results.length === 0
              ? <div style={{textAlign:'center',padding:'32px 0',color:A.textMut,fontSize:14}}>Sonuç bulunamadı</div>
              : results.map((t,i) => (
                <div key={t.id} onClick={()=>onPlayTrack(t)}
                  style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',cursor:'pointer',borderBottom:`1px solid ${A.borderLight}`}}>
                  <span style={{color:A.textGhost,fontSize:12,width:20,textAlign:'center'}}>{i+1}</span>
                  <Cover src={t.cover} size={46} radius={8}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{color:A.text,fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title}</div>
                    <div style={{color:A.textMut,fontSize:12,marginTop:2}}>{t.artist}</div>
                  </div>
                  <span style={{color:A.textMut,fontSize:12,flexShrink:0}}>{t.dur}</span>
                </div>
              ))
          }
        </div>
      ) : (
        <>
          <div style={{padding:'0 20px',marginBottom:14}}>
            <span style={{color:A.text,fontSize:16,fontWeight:700,letterSpacing:-0.4}}>Türlere Göz At</span>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,padding:'0 20px'}}>
            {GENRES.map(g => (
              <div key={g.id} onClick={()=>openModal('genre',g)} style={{borderRadius:16,overflow:'hidden',cursor:'pointer',height:88,
                background:`linear-gradient(135deg,${g.g[0]},${g.g[1]})`,
                display:'flex',flexDirection:'column',justifyContent:'flex-end',padding:'12px 16px'}}>
                <div style={{fontSize:22,marginBottom:2}}>{g.emoji}</div>
                <div style={{color:'#fff',fontSize:16,fontWeight:800}}>{g.name}</div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
};

const LangContext = React.createContext({lang:'tr', setLang:()=>{}, t:k=>TRANS.tr[k]||k});
const useLang = () => React.useContext(LangContext);

/* ─── MAIN APP ────────────────────────────────────────────── */
function App() {
  const [tab, setTab]             = useState('home');
  const [screen, setScreen]       = useState('login');
  const [currentTrack, setCurrentTrack] = useState(null);
  const [isPlaying, setIsPlaying] = useState(false);
  const [showPlayer, setShowPlayer]     = useState(false);
  const [subScreen, setSubScreen] = useState(null);
  const [queue, setQueue]         = useState(TRACKS);
  const [queueIdx, setQueueIdx]   = useState(0);
  const [modal, setModal]         = useState(null);
  const [posMs, setPosMs]         = useState(0);
  const [lang, setLang]           = useState('tr');
  const TRACK_DUR_MS = 233000; // 3:53

  // Real-time progress ticker
  useEffect(() => {
    if (!isPlaying || !currentTrack) return;
    const iv = setInterval(() => {
      setPosMs(p => {
        if (p + 500 >= TRACK_DUR_MS) { playNext(); return 0; }
        return p + 500;
      });
    }, 500);
    return () => clearInterval(iv);
  }, [isPlaying, currentTrack]);

  // Reset progress on track change
  useEffect(() => { setPosMs(0); }, [currentTrack]);

  const progress = TRACK_DUR_MS > 0 ? posMs / TRACK_DUR_MS : 0;
  const fmtTime = ms => { const s=Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;  };

  const playTrack = useCallback((track, list) => {
    const q = list || queue;
    const idx = q.findIndex(t => t.id === track.id);
    setQueue(q);
    setQueueIdx(idx >= 0 ? idx : 0);
    setCurrentTrack(track);
    setIsPlaying(true);
  }, [queue]);

  const queueRef = useRef({queue, queueIdx});
  useEffect(() => { queueRef.current = {queue, queueIdx}; }, [queue, queueIdx]);

  const playNext = useCallback(() => {
    const {queue:q, queueIdx:idx} = queueRef.current;
    const ni = (idx + 1) % q.length;
    setQueueIdx(ni); setCurrentTrack(q[ni]); setIsPlaying(true);
  }, []);

  const playPrev = useCallback(() => {
    const pi = (queueIdx - 1 + queue.length) % queue.length;
    setQueueIdx(pi);
    setCurrentTrack(queue[pi]);
    setIsPlaying(true);
  }, [queue, queueIdx]);

  const navigate = useCallback(to => {
    if (to === 'search')        { setTab('search'); setSubScreen(null); }
    else if (to === 'profile')  { setTab('profile'); setSubScreen(null); }
    else if (to === 'settings') setSubScreen('settings');
    else if (to === 'messages') setSubScreen('messages');
    else setSubScreen(null);
  }, []);

  const openModal = useCallback((type, data) => setModal({type, data}), []);
  const closeModal = useCallback(() => setModal(null), []);

  const renderTabContent = () => {
    if (subScreen === 'settings') return <SettingsScreen onNavigate={navigate} openModal={openModal} onLogout={()=>setScreen('login')}/>;
    if (subScreen === 'messages') return <MessagesScreen openModal={openModal}/>;
    switch(tab) {
      case 'home':    return <DashboardScreen onNavigate={navigate} onPlayTrack={t=>playTrack(t,TRACKS)} currentTrack={currentTrack} openModal={openModal}/>;
      case 'library': return <LibraryScreen onPlayTrack={t=>playTrack(t,TRACKS)} openModal={openModal}/>;
      case 'search':  return <SearchScreen onPlayTrack={t=>playTrack(t,TRACKS)} openModal={openModal}/>;
      case 'ar':      return (
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',paddingBottom:72}}>
          <div style={{fontSize:48,marginBottom:16,animation:'float 2s ease-in-out infinite'}}>🕶️</div>
          <div style={{color:A.text,fontSize:20,fontWeight:800,marginBottom:8,letterSpacing:-0.5}}>AR Müzik</div>
          <div style={{color:A.textMut,fontSize:14,textAlign:'center',padding:'0 40px',lineHeight:1.6}}>Dünyayı kameraya al ve müziği AR ile deneyimle</div>
        </div>
      );
      case 'rooms':   return (
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',paddingBottom:72}}>
          <div style={{fontSize:48,marginBottom:16,animation:'pulse 1.5s ease-in-out infinite'}}>📻</div>
          <div style={{color:A.text,fontSize:20,fontWeight:800,marginBottom:8,letterSpacing:-0.5}}>Dinleme Odaları</div>
          <div style={{color:A.textMut,fontSize:14,textAlign:'center',padding:'0 40px',lineHeight:1.6}}>Gerçek zamanlı olarak arkadaşlarınla bir odaya katıl</div>
        </div>
      );
      case 'profile': return <ProfileScreen onNavigate={navigate} openModal={openModal} onLogout={()=>setScreen('login')}/>;
      default: return null;
    }
  };

  const t = k => (TRANS[lang]||TRANS.en)[k] || TRANS.en[k] || TRANS.tr[k] || k;
  const langCtx = {lang, setLang, t};

  if (screen === 'login') {
    return (
      <LangContext.Provider value={langCtx}>
        <PhoneFrame>
          <LoginScreen onLogin={()=>setScreen('app')} onRegister={()=>setScreen('register')}/>
        </PhoneFrame>
      </LangContext.Provider>
    );
  }
  if (screen === 'register') {
    return (
      <LangContext.Provider value={langCtx}>
        <PhoneFrame>
          <RegisterScreen onBack={()=>setScreen('login')} onRegister={()=>setScreen('app')}/>
        </PhoneFrame>
      </LangContext.Provider>
    );
  }

  return (
    <LangContext.Provider value={langCtx}>
    <PhoneFrame>
      {/* Content */}
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',background:A.bg}}>
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',position:'relative'}}>
          {renderTabContent()}
        </div>
        {/* Mini Player */}
        {currentTrack && !showPlayer && (
          <MiniPlayer
            track={currentTrack}
            isPlaying={isPlaying}
            progress={progress}
            posMs={posMs}
            durMs={TRACK_DUR_MS}
            fmtTime={fmtTime}
            onToggle={()=>setIsPlaying(p=>!p)}
            onClose={()=>{setCurrentTrack(null);setIsPlaying(false);}}
            onExpand={()=>setShowPlayer(true)}
            onPrev={playPrev}
            onNext={playNext}
          />
        )}
        {/* Full Player */}
        {showPlayer && currentTrack && (
          <FullPlayerScreen
            track={currentTrack}
            isPlaying={isPlaying}
            progress={progress}
            posMs={posMs}
            durMs={TRACK_DUR_MS}
            fmtTime={fmtTime}
            onToggle={()=>setIsPlaying(p=>!p)}
            onClose={()=>setShowPlayer(false)}
            onPrev={playPrev}
            onNext={playNext}
            onShare={()=>openModal('share',currentTrack)}
          />
        )}
        <TabBar active={tab} onChange={t=>{setTab(t);setSubScreen(null);}}/>
        {/* Global Modal Overlay */}
        {modal && <ModalSystem modal={modal} onClose={closeModal} onPlayTrack={t=>playTrack(t,TRACKS)}/>}
      </div>
    </PhoneFrame>
    </LangContext.Provider>
  );
}
