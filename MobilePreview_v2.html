<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SocialBeats High-Fidelity Preview v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #08080F;
            --surface: rgba(255, 255, 255, 0.06);
            --card: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.12);
            --border-light: rgba(255, 255, 255, 0.06);
            --text: #F8FAFF;
            --text-sec: rgba(248, 250, 255, 0.65);
            --text-mut: rgba(248, 250, 255, 0.40);
            --primary: #A78BFA;
            --primary-deep: #7C3AED;
            --accent: #F472B6;
            --success: #34D399;
            --error: #F87171;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #030308;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            overflow: hidden; /* Prevent body scroll, use scaling instead */
        }

        /* Responsive Scaling Engine */
        #viewport {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }

        #phone-container {
            width: 393px;
            height: 852px;
            background: var(--bg);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(124, 58, 237, 0.2);
            border: 8px solid #1a1a1f;
            border-radius: 40px;
            transform-origin: center center;
        }

        /* Glassmorphism Classes */
        .glass {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
        }

        /* Ambient Glow */
        .ambient {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        /* Navigation */
        .tab-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 85px;
            background: rgba(8, 8, 15, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            border-top: 1px solid var(--border-light);
            z-index: 100;
        }

        .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-mut);
            cursor: pointer;
            position: relative;
        }

        .tab-item.active {
            color: var(--primary);
        }

        .tab-indicator {
            position: absolute;
            top: 0;
            width: 24px;
            height: 3px;
            background: var(--primary);
            border-bottom-left-radius: 3px;
            border-bottom-right-radius: 3px;
        }

        /* Views */
        .view {
            position: absolute;
            inset: 0;
            padding-top: 60px;
            padding-bottom: 200px;
            overflow-y: auto;
            visibility: hidden;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .view.active {
            visibility: visible;
            opacity: 1;
        }

        /* Components */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px 20px;
        }

        .greeting { font-size: 12px; color: var(--text-mut); }
        .username { font-size: 24px; font-weight: 900; }

        .header-icons { display: flex; gap: 12px; align-items: center; }
        .icon-btn {
            width: 40px; height: 40px; border-radius: 20px;
            background: var(--surface); display: flex;
            align-items: center; justify-content: center;
            position: relative; cursor: pointer;
        }
        .badge {
            position: absolute; top: 8px; right: 8px;
            width: 14px; height: 14px; border-radius: 7px;
            background: var(--accent); color: #fff;
            font-size: 8px; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
        }

        /* Stories */
        .stories-row {
            display: flex;
            gap: 14px;
            padding: 0 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .stories-row::-webkit-scrollbar { display: none; }

        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7px;
            min-width: 68px;
            cursor: pointer;
        }
        .story-ring {
            width: 64px; height: 64px; border-radius: 50%;
            padding: 2.5px;
            background: linear-gradient(45deg, var(--primary), var(--accent));
        }
        .story-inner {
            width: 59px; height: 59px; border-radius: 50%;
            background: var(--bg); padding: 2px;
        }
        .story-img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover;
        }
        .story-name { font-size: 10px; color: var(--text-sec); text-align: center; }

        /* Featured Cards */
        .featured-scroll {
            display: flex; gap: 15px; padding: 0 20px;
            overflow-x: auto; scrollbar-width: none;
        }
        .featured-scroll::-webkit-scrollbar { display: none; }

        .feat-card {
            min-width: 300px; height: 185px; border-radius: 28px;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 20px; cursor: pointer;
        }
        .feat-bg { position: absolute; inset: 0; object-fit: cover; z-index: -1; }
        .feat-grad { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); }
        .feat-title { font-size: 22px; font-weight: 900; position: relative; }
        .feat-artist { font-size: 14px; color: rgba(255,255,255,0.7); position: relative; }
        .pill {
            background: var(--primary); padding: 4px 10px;
            border-radius: 8px; font-size: 10px; font-weight: 900;
            align-self: flex-start; margin-bottom: 8px; position: relative;
        }

        /* Sections */
        .section-label {
            padding: 30px 20px 15px; font-size: 19px; font-weight: 900;
            display: flex; justify-content: space-between; align-items: center;
        }
        .see-all { color: var(--primary); font-size: 13px; font-weight: 700; cursor: pointer; }

        /* Genre Grid */
        .genre-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; padding: 0 15px;
        }
        .genre-card {
            height: 85px; border-radius: 20px; padding: 15px;
            display: flex; flex-direction: column; justify-content: flex-end;
            cursor: pointer; position: relative; overflow: hidden;
        }
        .genre-name { font-size: 15px; font-weight: 800; }
        .genre-emoji { font-size: 22px; margin-bottom: 4px; }

        /* Mini Player */
        .mini-player {
            position: absolute; bottom: 95px; left: 12px; right: 12px;
            height: 64px; border-radius: 20px; overflow: hidden;
            display: flex; align-items: center; padding: 0 15px;
            z-index: 90; cursor: pointer;
        }
        .mini-inner { display: flex; align-items: center; flex: 1; }
        .mini-img { width: 44px; height: 44px; border-radius: 12px; object-fit: cover; }
        .mini-info { margin-left: 10px; flex: 1; }
        .mini-title { font-size: 14px; font-weight: 800; }
        .mini-artist { font-size: 12px; color: var(--text-sec); }
        .player-prog {
            position: absolute; bottom: 0; left: 0;
            height: 2px; background: var(--primary);
            width: 45%;
        }

        /* Modals & Overlays */
        #story-viewer {
            position: absolute; inset: 0; background: #000;
            z-index: 200; display: none;
            flex-direction: column;
        }
        #story-viewer.active { display: flex; }
        .story-bars { display: flex; gap: 4px; padding: 55px 12px 10px; }
        .story-bar { flex: 1; height: 3px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
        .story-fill { height: 100%; width: 0%; background: #fff; }

        #chat-view, #genre-view, #settings-view {
            position: absolute; inset: 0; background: var(--bg);
            z-index: 150; display: none; flex-direction: column;
            padding-top: 60px;
        }
        .active-overlay { display: flex !important; }

        .back-btn { cursor: pointer; padding: 10px; display: flex; align-items: center; }

        /* Chat bubbles */
        .bubble { padding: 14px; border-radius: 20px; margin-bottom: 15px; max-width: 78%; font-size: 14px; }
        .bubble-me { align-self: flex-end; background: var(--primary-deep); }
        .bubble-other { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); }
        
        /* Animations */
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide { animation: slideIn 0.3s ease-out; }

    </style>
</head>
<body>

<div id="viewport">
    <div id="phone-container">
    <div class="ambient" style="top: -50px; left: 50px; background: var(--primary);"></div>
    
    <!-- DASHBOARD VIEW -->
    <div id="view-home" class="view active">
        <div class="header">
            <div>
                <div class="greeting">Good evening 🌙</div>
                <div class="username">Anatolia</div>
            </div>
            <div class="header-icons">
                <div class="icon-btn" onclick="openChat('melodikbeat')"><i data-lucide="message-circle"></i></div>
                <div class="icon-btn">
                    <i data-lucide="bell"></i>
                    <div class="badge">3</div>
                </div>
                <img src="https://i.pravatar.cc/100?u=anatolia" style="width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--primary);">
            </div>
        </div>

        <!-- Stories -->
        <div class="stories-row">
            <div class="story-item">
                <div style="width: 62px; height: 62px; border-radius: 50%; border: 1.5px solid var(--border); padding: 2px; position: relative;">
                    <img src="https://i.pravatar.cc/100?u=anatolia" class="story-img" style="filter: grayscale(1);">
                    <div style="position: absolute; bottom: 0; right: 0; width: 18px; height: 18px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg);">
                        <i data-lucide="plus" style="width: 10px; height: 10px; color: #fff;"></i>
                    </div>
                </div>
                <div class="story-name">Your story</div>
            </div>
            <div class="story-item" onclick="openStory()">
                <div class="story-ring"><div class="story-inner"><img src="https://i.pravatar.cc/100?u=melodikbeat" class="story-img"></div></div>
                <div class="story-name">melodikbeat</div>
            </div>
            <div class="story-item" onclick="openStory()">
                <div class="story-ring"><div class="story-inner"><img src="https://i.pravatar.cc/100?u=djvibe" class="story-img"></div></div>
                <div class="story-name">djvibe</div>
            </div>
        </div>

        <div class="section-label">Featured <span class="see-all">See all</span></div>
        <div class="featured-scroll">
            <div class="feat-card" style="background: #3B0764;">
                <img src="https://picsum.photos/seed/feat0/400/400" class="feat-bg">
                <div class="feat-grad"></div>
                <div class="pill">NEW RELEASE</div>
                <div class="feat-title">Midnight Pulse</div>
                <div class="feat-artist">Aurora X</div>
            </div>
            <div class="feat-card" style="background: #0C4A6E;">
                <img src="https://picsum.photos/seed/feat1/400/400" class="feat-bg">
                <div class="feat-grad"></div>
                <div class="pill">TRENDING</div>
                <div class="feat-title">Neon Dreams</div>
                <div class="feat-artist">The Midnight</div>
            </div>
        </div>

        <div class="section-label">Discover Genres</div>
        <div class="genre-grid">
            <div class="genre-card" style="background: linear-gradient(135deg, #9333EA, #F472B6);" onclick="openGenre('Pop', '✨')">
                <div class="genre-emoji">✨</div>
                <div class="genre-name">Pop</div>
            </div>
            <div class="genre-card" style="background: linear-gradient(135deg, #EA580C, #F472B6);" onclick="openGenre('Hip-Hop', '🔥')">
                <div class="genre-emoji">🔥</div>
                <div class="genre-name">Hip-Hop</div>
            </div>
        </div>
    </div>

    <!-- MINI PLAYER -->
    <div class="mini-player glass" id="mini-player">
        <div class="mini-inner">
            <img src="https://picsum.photos/seed/track0/100/100" class="mini-img">
            <div class="mini-info">
                <div class="mini-title">Shape of You</div>
                <div class="mini-artist">Ed Sheeran</div>
            </div>
            <div style="cursor: pointer; padding: 10px;" id="play-pause"><i data-lucide="play"></i></div>
        </div>
        <div class="player-prog"></div>
    </div>

    <!-- OVERLAYS -->
    <div id="story-viewer">
        <div class="story-bars">
            <div class="story-bar"><div class="story-fill" id="story-fill-1"></div></div>
            <div class="story-bar"><div class="story-fill"></div></div>
        </div>
        <div style="display: flex; align-items: center; padding: 15px; position: relative; z-index: 10;">
            <img src="https://i.pravatar.cc/100?u=melodikbeat" style="width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid #fff;">
            <div style="margin-left: 10px; font-weight: 800; font-size: 14px;">melodikbeat</div>
            <div style="margin-left: auto; cursor: pointer;" onclick="closeOverlays()"><i data-lucide="x" style="color: #fff;"></i></div>
        </div>
        <div id="story-bg" style="position: absolute; inset: 0; background: url(https://picsum.photos/seed/story1/800/1600); background-size: cover;"></div>
    </div>

    <div id="chat-view" class="animate-slide">
        <div class="header" style="border-bottom: 1px solid var(--border-light); margin-bottom: 20px;">
            <div class="back-btn" onclick="closeOverlays()"><i data-lucide="arrow-left"></i></div>
            <div style="flex: 1; margin-left: 15px; display: flex; align-items: center;">
                <img id="chat-user-img" src="" style="width: 36px; height: 36px; border-radius: 50%;">
                <div style="margin-left: 10px;">
                    <div id="chat-user-name" style="font-weight: 800; font-size: 15px;"></div>
                    <div style="color: var(--success); font-size: 11px;">online</div>
                </div>
            </div>
            <i data-lucide="phone"></i>
        </div>
        <div style="flex: 1; padding: 0 20px; overflow-y: auto; display: flex; flex-direction: column;">
            <div class="bubble bubble-other">Yeni parça yayınlandı! 🎵</div>
            <div class="bubble bubble-me">Harika, hemen bakıyorum. 🔥</div>
        </div>
        <div style="height: 80px; padding: 20px; border-top: 1px solid var(--border-light); display: flex; gap: 15px; align-items: center;">
            <div style="flex: 1; background: var(--surface); height: 44px; border-radius: 22px; display: flex; align-items: center; padding: 0 20px; color: var(--text-mut);">Message...</div>
            <i data-lucide="send" style="color: var(--primary);"></i>
        </div>
    </div>

    <!-- TAB BAR -->
    <div class="tab-bar">
        <div class="tab-item active"><div class="tab-indicator"></div><i data-lucide="home"></i></div>
        <div class="tab-item"><i data-lucide="search"></i></div>
        <div class="tab-item"><i data-lucide="library"></i></div>
        <div class="tab-item" onclick="openSettings()"><i data-lucide="user"></i></div>
    </div>

    </div>
</div>

<script>
    lucide.createIcons();

    // Auto-Scaling Logic
    function handleResize() {
        const container = document.getElementById('phone-container');
        const vW = window.innerWidth;
        const vH = window.innerHeight;
        const cW = 410; // Container width + border
        const cH = 870; // Container height + border
        
        const scale = Math.min(vW / cW, vH / cH) * 0.95;
        container.style.transform = `scale(${scale})`;
    }

    window.addEventListener('resize', handleResize);
    handleResize();

    function closeOverlays() {
        document.getElementById('story-viewer').classList.remove('active');
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('story-fill-1').style.width = '0%';
        clearInterval(storyInterval);
    }

    let storyInterval;
    function openStory() {
        closeOverlays();
        const viewer = document.getElementById('story-viewer');
        const fill = document.getElementById('story-fill-1');
        viewer.classList.add('active');
        
        let p = 0;
        storyInterval = setInterval(() => {
            p += 1;
            fill.style.width = p + '%';
            if (p >= 100) {
                clearInterval(storyInterval);
                closeOverlays();
            }
        }, 40);
    }

    function openChat(user) {
        closeOverlays();
        const chat = document.getElementById('chat-view');
        document.getElementById('chat-user-img').src = `https://i.pravatar.cc/100?u=${user}`;
        document.getElementById('chat-user-name').innerText = user;
        chat.style.display = 'flex';
    }

    function openSettings() {
        alert("Settings component triggered (Virtual Twin logic active)");
    }

    function openGenre(name, emoji) {
        alert("Opening Genre: " + name + " " + emoji);
    }
</script>
</body>
</html>
